<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#FF385C">
    <title>Convertidor de Divisas - TripwiseAI</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/converter.css">
</head>
<body>

    <header class="site-header">
        <div class="header-content">
            <div class="header-left">
                <a href="index.html" class="header-logo">✈️ TripwiseAI</a>
            </div>
            <div class="header-right">
                <select id="language-selector" class="language-select">
                    <option value="es">🇪🇸 ES</option>
                    <option value="en">🇺🇸 EN</option>
                    <option value="pt">🇧🇷 PT</option>
                    <option value="fr">🇫🇷 FR</option>
                    <option value="de">🇩🇪 DE</option>
                    <option value="zh">🇨🇳 ZH</option>
                    <option value="ja">🇯🇵 JA</option>
                </select>
                <a href="index.html" class="nav-link">✈️ Vuelos</a>
                <a href="compare.html" class="nav-link">🔍 Comparar</a>
                <a href="map.html" class="nav-link">🗺️ Mapa</a>
                <a href="vplus.html" class="nav-link nav-link-vplus">🎫 V+</a>
            </div>
        </div>
    </header>

    <div class="page-hero">
        <div class="page-hero-inner">
            <h1>💱 Divisas</h1>
            <p class="hero-subtitle" id="hero-rate-text">Convierte entre monedas en tiempo real</p>
        </div>
    </div>

    <div class="container">
        <main>

            <!-- Main converter card -->
            <section class="conv-card">

                <!-- FROM -->
                <div class="conv-half conv-from">
                    <span class="conv-label">De</span>
                    <div class="conv-row">
                        <select id="from-currency" class="conv-select">
                            <option value="">Cargando...</option>
                        </select>
                        <input
                            type="number"
                            id="from-amount"
                            class="conv-amount-input"
                            value="100"
                            min="0"
                            step="any"
                            inputmode="decimal"
                        >
                    </div>
                </div>

                <!-- Divider: rate + swap -->
                <div class="conv-divider">
                    <span class="conv-rate-text" id="conv-rate">—</span>
                    <button class="conv-swap-btn" id="swap-btn" title="Intercambiar monedas">⇅</button>
                </div>

                <!-- TO -->
                <div class="conv-half conv-to">
                    <span class="conv-label">A</span>
                    <div class="conv-row">
                        <select id="to-currency" class="conv-select">
                            <option value="">Cargando...</option>
                        </select>
                        <div class="conv-result-display" id="to-result">—</div>
                    </div>
                </div>

                <!-- Footer -->
                <div class="conv-footer">
                    <small id="conv-update">Cargando tasas...</small>
                </div>
            </section>

            <!-- Compare more currencies -->
            <section class="card extra-card" id="extra-section">
                <div class="extra-header" id="extra-toggle">
                    <span>Comparar con otras monedas</span>
                    <span class="extra-chevron" id="extra-chevron">＋</span>
                </div>
                <div id="extra-container" class="extra-container hidden">
                    <div id="extra-currencies" class="extra-currencies-grid"></div>
                    <button class="btn btn-outline extra-add-btn" id="add-currency-btn">+ Agregar moneda</button>
                </div>
            </section>

        </main>

        <footer>
            <p>TripwiseAI · Tasas en tiempo real vía ExchangeRate-API</p>
        </footer>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/currency-data.js"></script>
    <script src="js/converter.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
