<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#FF385C">
    <title>Convertidor de Monedas - TripwiseAI</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/converter.css">
</head>
<body>

    <header class="site-header">
        <div class="header-content">
            <div class="header-left">
                <a href="index.html" class="header-logo">✈️ TripwiseAI</a>
            </div>
            <div class="header-right">
                <select id="language-selector" class="language-select">
                    <option value="es">🇪🇸 ES</option>
                    <option value="en">🇺🇸 EN</option>
                    <option value="pt">🇧🇷 PT</option>
                </select>
                <select id="currency-selector" class="currency-select">
                    <option value="USD">🇺🇸 USD</option>
                    <option value="MXN" selected>🇲🇽 MXN</option>
                    <option value="COP">🇨🇴 COP</option>
                </select>
                <a href="index.html" class="nav-link" data-i18n="header.flights">✈️ Vuelos</a>
                <a href="currency-converter.html" class="nav-link" data-i18n="header.converter">💱 Divisas</a>
                <a href="map.html" class="nav-link">🗺️ Mapa</a>
                <a href="vplus.html" class="nav-link nav-link-vplus">🎫 V+</a>
            </div>
        </div>
    </header>

    <div class="page-hero">
        <div class="page-hero-inner">
            <h1 data-i18n="converter.title">Divisas</h1>
            <p class="hero-subtitle" data-i18n="converter.subtitle">Compara hasta 4 monedas en tiempo real</p>
        </div>
    </div>

    <div class="container">
        <main>
            <!-- Amount Input -->
            <section class="card converter-card">
                <div class="amount-section">
                    <label for="amount">Cantidad a convertir</label>
                    <input
                        type="number"
                        id="amount"
                        class="input amount-input"
                        placeholder="100.00"
                        value="100"
                        min="0"
                        step="0.01"
                    >
                </div>
            </section>

            <!-- Currency Converters -->
            <section class="card converters-section">
                <h2>Monedas a comparar</h2>
                <p class="step-subtitle">Selecciona entre 2 y 4 monedas para comparar</p>

                <div id="currencies-container" class="currencies-container"></div>

                <button id="add-currency-btn" class="btn btn-outline" style="display: none; margin-top: 16px;">
                    + Agregar moneda
                </button>
            </section>

            <!-- Results -->
            <section id="results-section" class="card results-card hidden">
                <h2>Resultados</h2>
                <div id="results-container" class="results-container"></div>
                <div class="update-info">
                    <small>Tasas actualizadas: <span id="last-update"></span></small>
                </div>
            </section>
        </main>

        <footer>
            <p>TripwiseAI · Tasas en tiempo real</p>
        </footer>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/currency-data.js"></script>
    <script src="js/converter.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
