<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#FF385C">
    <title>Convertidor de Monedas - Travel Advisor</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/converter.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="header-left">
                    <h1 data-i18n="converter.title">Convertidor de Monedas</h1>
                    <p class="subtitle" data-i18n="converter.subtitle">Compara hasta 4 monedas en tiempo real</p>
                </div>
                <div class="header-right">
                    <select id="language-selector" class="language-select">
                        <option value="es">🇪🇸 ES</option>
                        <option value="en">🇺🇸 EN</option>
                        <option value="pt">🇧🇷 PT</option>
                    </select>
                    <a href="index.html" class="back-link" data-i18n="converter.back">
                        ← Volver
                    </a>
                </div>
            </div>
        </header>

        <main>
            <!-- Amount Input -->
            <section class="card converter-card">
                <div class="amount-section">
                    <label for="amount">Cantidad</label>
                    <input
                        type="number"
                        id="amount"
                        class="input amount-input"
                        placeholder="100.00"
                        value="100"
                        min="0"
                        step="0.01"
                    >
                </div>
            </section>

            <!-- Currency Converters -->
            <section class="card converters-section">
                <h2>Monedas a comparar</h2>
                <p class="section-description">Selecciona entre 2 y 4 monedas para comparar</p>

                <div id="currencies-container" class="currencies-container">
                    <!-- Currency items will be added here -->
                </div>

                <button id="add-currency-btn" class="btn btn-secondary" style="display: none;">
                    + Agregar moneda
                </button>
            </section>

            <!-- Results -->
            <section id="results-section" class="card results-card hidden">
                <h2>Resultados</h2>
                <div id="results-container" class="results-container">
                    <!-- Results will appear here -->
                </div>
                <div class="update-info">
                    <small>Tasas actualizadas: <span id="last-update"></span></small>
                </div>
            </section>
        </main>

        <footer>
            <p>Powered by Exchange Rates API | Travel Advisor v1.0</p>
        </footer>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/currency-data.js"></script>
    <script src="js/converter.js"></script>
</body>
</html>
