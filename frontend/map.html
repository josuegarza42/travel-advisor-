<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#FF385C">
    <title>Mapa de Destinos - TripwiseAI</title>
    <link href="libs/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="site-header">
        <div class="header-content">
            <div class="header-left">
                <a href="index.html" class="header-logo">✈️ TripwiseAI</a>
            </div>
            <div class="header-right">
                <select id="language-selector" class="language-select">
                    <option value="es">🇪🇸 ES</option>
                    <option value="en">🇺🇸 EN</option>
                    <option value="pt">🇧🇷 PT</option>
                    <option value="fr">🇫🇷 FR</option>
                    <option value="de">🇩🇪 DE</option>
                    <option value="zh">🇨🇳 ZH</option>
                    <option value="ja">🇯🇵 JA</option>
                </select>
                <select id="currency-selector" class="currency-select">
                    <option value="USD">🇺🇸 USD</option>
                    <option value="MXN" selected>🇲🇽 MXN</option>
                    <option value="COP">🇨🇴 COP</option>
                </select>
                <a href="index.html" class="nav-link">✈️ Vuelos</a>
                <a href="currency-converter.html" class="nav-link">💱 Divisas</a>
                <a href="map.html" class="nav-link">🗺️ Mapa</a>
                <a href="vplus.html" class="nav-link nav-link-vplus">🎫 V+</a>
            </div>
        </div>
    </header>

    <div class="page-hero">
        <div class="page-hero-inner">
            <h1>Mapa de destinos</h1>
            <p class="hero-subtitle">Descubre los destinos más populares cerca de tu ciudad</p>
        </div>
    </div>

    <div class="container">
        <main>
            <section class="card" style="max-width: 600px; margin: 0 auto 20px auto; text-align: center;">
                <h2 style="margin-bottom: 16px;">Buscar destinos</h2>
                <div style="display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;">
                    <input
                        type="text"
                        id="city-input"
                        class="input"
                        placeholder="Ej: Cancún, Medellín, Barcelona..."
                        style="flex: 1; min-width: 150px; max-width: 360px;"
                    >
                    <button id="search-btn" class="btn btn-primary" style="white-space: nowrap;">🔍 Buscar</button>
                </div>
                <p id="city-subtitle" style="margin-top: 12px; color: #666; font-size: 0.95rem; min-height: 1.4em;">
                    <span id="city-title"></span>
                </p>
            </section>

            <section class="card" style="max-width: 900px; margin: 0 auto 20px auto;">
                <div id="map" style="width: 100%; height: min(420px, 55vh); border-radius: 12px;"></div>
            </section>

            <section class="card" style="max-width: 600px; margin: 0 auto;">
                <div id="destinations-section">
                    <h3 style="margin-bottom: 12px;">Destinos populares para visitar</h3>
                    <ul id="destinations-list" style="list-style: none; padding: 0; font-size: 1.05rem;"></ul>
                </div>
            </section>
        </main>

        <footer>
            <p>TripwiseAI · Datos via OpenTripMap</p>
        </footer>
    </div>

    <script src="libs/maplibre-gl.js"></script>
    <script src="js/config.js"></script>
    <script src="js/opentripmap.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
